<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>ParkDirect24 Label</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23c0f73a'/><text x='16' y='23' font-size='20' font-weight='bold' text-anchor='middle' fill='%23000'>P</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#262626;--text:#e8e8e8;--text2:#777;--text3:#444;--accent:#c0f73a;--accent-dim:rgba(192,247,58,0.1);--green:#4ade80;--green-bg:rgba(74,222,128,0.08);--r:12px}
  html,body{height:100%}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

  .login-screen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .login-box{width:100%;max-width:360px}
  .login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
  .login-logo-icon{width:48px;height:48px;background:var(--accent);border-radius:12px;display:grid;place-items:center;font-size:24px;font-weight:700;color:#000;font-family:'JetBrains Mono',monospace}
  .login-logo h1{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700}
  .login-logo h1 span{color:var(--accent)}

  .form-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:6px;font-family:'JetBrains Mono',monospace}
  .form-input{width:100%;padding:14px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;transition:border-color .2s;outline:none}
  .form-input:focus{border-color:var(--accent)}
  .form-input::placeholder{color:var(--text3)}
  .form-group{margin-bottom:16px}
  .btn{width:100%;padding:15px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:transform .12s,opacity .12s;letter-spacing:.3px}
  .btn:active{transform:scale(.97);opacity:.9}
  .btn-accent{background:var(--accent);color:#000}
  .btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
  .btn-outline:active{background:var(--accent-dim)}
  .btn-white{background:#fff;color:#000}
  .btn-ghost{background:transparent;color:var(--text2);font-weight:500;font-family:'DM Sans',sans-serif;font-size:14px;border:none}
  .btn-sm{padding:10px 16px;font-size:13px;width:auto}
  .error-msg{color:#f87171;font-size:13px;margin-top:8px;text-align:center}

  .app{display:none;min-height:100dvh;flex-direction:column}
  .app.active{display:flex}
  .header{padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
  .header-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:grid;place-items:center;font-size:16px;color:#000;font-weight:700;font-family:'JetBrains Mono',monospace}
  .header h1{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}
  .header h1 span{color:var(--accent)}
  .header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
  .header-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:border-color .2s}
  .header-btn:active{border-color:var(--accent);color:var(--accent)}
  .main{flex:1;padding:16px 20px;max-width:600px;margin:0 auto;width:100%;overflow-y:auto}

  .search-bar{position:relative;margin-bottom:16px}
  .search-bar input{width:100%;padding:12px 16px 12px 42px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;outline:none;font-family:'DM Sans',sans-serif}
  .search-bar input:focus{border-color:var(--accent)}
  .search-bar input::placeholder{color:var(--text3)}
  .search-bar .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}

  .status-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .status-chip{padding:5px 10px;border-radius:8px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600}
  .chip-green{background:var(--green-bg);color:var(--green)}
  .chip-blue{background:rgba(96,165,250,0.08);color:#60a5fa}

  .booking-list{display:flex;flex-direction:column;gap:8px;padding-bottom:80px}
  .booking-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:border-color .2s,background .15s;position:relative}
  .booking-card:active{border-color:var(--accent);background:var(--surface2)}
  .booking-plate{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;letter-spacing:1.5px;color:var(--accent)}
  .booking-name{font-size:14px;font-weight:600;color:var(--text);margin-top:4px}
  .booking-details{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2);margin-top:6px}
  .booking-detail strong{color:var(--text)}

  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{color:var(--text2);font-size:14px}
  .empty{text-align:center;padding:48px 20px;color:var(--text2);font-size:14px}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;overflow-y:auto;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .modal-overlay.active{display:block}
  .modal-content{max-width:420px;margin:20px auto;padding:20px}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .modal-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
  .modal-close{background:var(--surface);border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;display:grid;place-items:center}

  .edit-field{margin-bottom:14px}
  .edit-field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:4px;font-family:'JetBrains Mono',monospace}
  .edit-field input{width:100%;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;font-family:'DM Sans',sans-serif}
  .edit-field input:focus{border-color:var(--accent)}
  .edit-field input.plate-input{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;letter-spacing:2px;text-transform:uppercase;text-align:center}
  .edit-field .static{padding:8px 0;font-size:14px;color:var(--text)}

  .label-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;display:flex;justify-content:center;margin-bottom:16px}
  .label-frame{background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.5)}
  #labelCanvas{display:block}
  .btn-group-stack{display:flex;flex-direction:column;gap:8px}

  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--accent);color:var(--accent);padding:12px 24px;border-radius:50px;font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;opacity:0;transition:all .3s ease;z-index:1000;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .booking-card{animation:fadeUp .3s ease forwards;opacity:0}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><div class="login-logo-icon">P</div><h1>Park<span>Direct24</span> Label</h1></div>
    <div class="form-group"><label class="form-label">Team-Passwort</label><input type="password" id="loginPass" class="form-input" placeholder="Passwort eingeben" autofocus></div>
    <button class="btn btn-accent" onclick="doLogin()">EINLOGGEN</button>
    <div id="loginError" class="error-msg" style="display:none"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="header">
    <div class="header-icon">P</div><h1>Park<span>Direct24</span></h1>
    <div class="header-right"><button class="header-btn" onclick="loadBookings()">↻ Laden</button><button class="header-btn" onclick="doLogout()">Logout</button></div>
  </div>
  <div class="main">
    <div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Kennzeichen oder Name suchen..." oninput="filterBookings()"></div>
    <div class="status-bar" id="statusBar"></div>
    <div id="loadingState" class="loading" style="display:none"><div class="spinner"></div><div class="loading-text">Check-In Buchungen werden geladen...</div></div>
    <div id="errorState" class="empty" style="display:none"></div>
    <div id="bookingList" class="booking-list"></div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <div class="modal-header"><div class="modal-title">Bearbeiten & Label drucken</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="edit-field"><label>Kennzeichen</label><input type="text" id="editPlate" class="plate-input" autocapitalize="characters" autocomplete="off" spellcheck="false" oninput="this.value=this.value.toUpperCase();renderLabel()"></div>
    <div class="edit-field"><label>Kundenname</label><input type="text" id="editName" oninput="renderLabel()"></div>
    <div class="edit-field"><label>Rückgabe (Check-out)</label><div class="static" id="editReturn">—</div></div>
    <div class="edit-field"><label>Stellplatz (optional)</label><input type="text" id="editSpot" placeholder="z.B. A-12" autocomplete="off" oninput="renderLabel()"></div>
    <div class="label-wrap"><div class="label-frame"><canvas id="labelCanvas"></canvas></div></div>
    <div class="btn-group-stack">
      <button class="btn btn-white" onclick="downloadLabel()">📲 ALS BILD SPEICHERN</button>
      <button class="btn btn-outline" onclick="shareLabel()">↗ TEILEN / DRUCKEN</button>
      <button class="btn btn-ghost" onclick="closeModal()">← Zurück</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let authToken = localStorage.getItem('pp_token') || '';
let allBookings = [];
let currentBooking = null;

if (authToken) { showApp(); loadBookings(); } else { document.getElementById('loginScreen').style.display = 'flex'; }
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const pass = document.getElementById('loginPass').value.trim();
  if (!pass) return;
  try {
    const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pass}) });
    const data = await res.json();
    if (data.success) { authToken=data.token; localStorage.setItem('pp_token',authToken); showApp(); loadBookings(); }
    else showLoginError('Falsches Passwort');
  } catch(e) { showLoginError('Verbindungsfehler'); }
}
function doLogout() { authToken=''; localStorage.removeItem('pp_token'); document.getElementById('app').classList.remove('active'); document.getElementById('loginScreen').style.display='flex'; }
function showApp() { document.getElementById('loginScreen').style.display='none'; document.getElementById('app').classList.add('active'); }
function showLoginError(m) { const e=document.getElementById('loginError'); e.textContent=m; e.style.display='block'; setTimeout(()=>e.style.display='none',3000); }

async function loadBookings() {
  const list=document.getElementById('bookingList'), loading=document.getElementById('loadingState'), err=document.getElementById('errorState');
  list.innerHTML=''; loading.style.display='flex'; err.style.display='none'; document.getElementById('searchInput').value='';
  try {
    const res = await fetch('/api/bookings', {headers:{'X-Auth-Token':authToken}});
    if (res.status===401) { doLogout(); return; }
    const data = await res.json();
    if (data.error) throw new Error(data.detail||data.error);
    allBookings = (data.bookings||[]).filter(b => b.type==='checkin');
    loading.style.display='none';
    document.getElementById('statusBar').innerHTML = `<div class="status-chip chip-blue">${data.date||'Heute'}</div><div class="status-chip chip-green">▶ ${allBookings.length} Check-Ins</div>`;
    if (!allBookings.length) { err.textContent='Keine Check-In Buchungen für heute.'; err.style.display='block'; return; }
    renderBookings(allBookings);
    showToast(allBookings.length+' Check-Ins geladen ✓');
  } catch(e) { loading.style.display='none'; err.innerHTML=`<div style="margin-bottom:8px">⚠️ ${e.message}</div><button class="btn btn-accent btn-sm" onclick="loadBookings()" style="display:inline-block;width:auto">Nochmal</button>`; err.style.display='block'; }
}

function filterBookings() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q ? allBookings.filter(b => (b.kennzeichen||'').toLowerCase().includes(q) || (b.name||'').toLowerCase().includes(q)) : allBookings;
  renderBookings(filtered);
  const c=document.querySelector('.chip-green'); if(c) c.textContent='▶ '+filtered.length+' Check-Ins';
}

function renderBookings(list) {
  const el=document.getElementById('bookingList');
  if (!list.length) { el.innerHTML='<div class="empty">Keine Treffer.</div>'; return; }
  el.innerHTML = list.map((b,i) => `<div class="booking-card" onclick="openEdit(${allBookings.indexOf(b)})" style="animation-delay:${Math.min(i,15)*0.03+0.05}s">
    <div class="booking-plate">${b.kennzeichen||'—'}</div>
    <div class="booking-name">${b.name||'—'}</div>
    <div class="booking-details">
      ${b.rueckgabe?`<div class="booking-detail">↩ <strong>${b.rueckgabe}</strong></div>`:''}
      ${b.zeit?`<div class="booking-detail">⏰ ${b.zeit}</div>`:''}
      ${b.personen?`<div class="booking-detail">👤 ${b.personen}</div>`:''}
      ${b.fahrzeug?`<div class="booking-detail">🚗 ${b.fahrzeug}</div>`:''}
    </div></div>`).join('');
}

function openEdit(idx) {
  currentBooking = { ...allBookings[idx], _idx:idx };
  document.getElementById('editPlate').value = currentBooking.kennzeichen||'';
  document.getElementById('editName').value = currentBooking.name||'';
  document.getElementById('editReturn').textContent = currentBooking.rueckgabe||'—';
  document.getElementById('editSpot').value = '';
  document.getElementById('editModal').classList.add('active');
  renderLabel();
}

function closeModal() {
  if (currentBooking) {
    allBookings[currentBooking._idx].kennzeichen = document.getElementById('editPlate').value.trim().toUpperCase();
    allBookings[currentBooking._idx].name = document.getElementById('editName').value.trim();
    filterBookings();
  }
  document.getElementById('editModal').classList.remove('active');
}

function renderLabel() {
  const plate = (document.getElementById('editPlate').value||'').trim().toUpperCase();
  const name = (document.getElementById('editName').value||'').trim();
  const ret = document.getElementById('editReturn').textContent||'';
  const spot = (document.getElementById('editSpot').value||'').trim();

  const W=709, H=472, canvas=document.getElementById('labelCanvas');
  canvas.width=W; canvas.height=H; canvas.style.width='100%'; canvas.style.maxWidth='340px'; canvas.style.height='auto';
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  // Top bar
  ctx.fillStyle='#111'; ctx.fillRect(0,0,W,52);
  ctx.fillStyle='#4ade80'; ctx.font='bold 22px "Helvetica Neue",Arial,sans-serif'; ctx.textBaseline='middle';
  ctx.fillText('▶ CHECK-IN',20,26);
  if (ret&&ret!=='—') { ctx.fillStyle='#bbb'; ctx.font='17px "Helvetica Neue",Arial,sans-serif'; ctx.textAlign='right'; ctx.fillText('Rückgabe: '+ret,W-20,26); ctx.textAlign='left'; }

  // PLATE - dominant
  ctx.fillStyle='#000'; let fs=82;
  ctx.font=`bold ${fs}px "Helvetica Neue",Arial,sans-serif`; ctx.textBaseline='top';
  while(ctx.measureText(plate||'—').width>W-40&&fs>40){fs-=4;ctx.font=`bold ${fs}px "Helvetica Neue",Arial,sans-serif`;}
  ctx.fillText(plate||'—',20,72);
  ctx.fillStyle='#e0e0e0'; ctx.fillRect(20,72+fs+6,W-40,2);

  // Name
  ctx.fillStyle='#333'; ctx.font='500 30px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText(name,20,72+fs+22);

  // Spot
  if(spot){ctx.fillStyle='#999';ctx.font='15px "Helvetica Neue",Arial,sans-serif';ctx.textAlign='right';ctx.fillText('STELLPLATZ',W-20,72+fs+20);ctx.fillStyle='#000';ctx.font='bold 32px "Helvetica Neue",Arial,sans-serif';ctx.fillText(spot,W-20,72+fs+40);ctx.textAlign='left';}

  // Bottom
  ctx.fillStyle='#f5f5f5'; ctx.fillRect(0,H-42,W,42);
  ctx.fillStyle='#bbb'; ctx.font='14px "Helvetica Neue",Arial,sans-serif'; ctx.fillText('ParkDirect24',20,H-18);
  ctx.textAlign='right'; ctx.fillStyle='#ccc'; ctx.font='12px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText(new Date().toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),W-20,H-18);
  ctx.textAlign='left';
}

function downloadLabel() {
  const c=document.getElementById('labelCanvas'), p=(document.getElementById('editPlate').value||'label').trim().toUpperCase().replace(/[\s\.]/g,'-');
  const a=document.createElement('a'); a.download=`label-${p}-${Date.now()}.png`; a.href=c.toDataURL('image/png'); a.click(); showToast('Gespeichert ✓');
}
async function shareLabel() {
  try { const b=await new Promise(r=>document.getElementById('labelCanvas').toBlob(r,'image/png')); const f=new File([b],'label.png',{type:'image/png'}); if(navigator.canShare?.({files:[f]})){await navigator.share({files:[f],title:'Label'});}else{downloadLabel();} } catch(e){downloadLabel();}
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
</script>
</body>
</html>
